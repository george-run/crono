<!DOCTYPE html>
<html lang="en" data-i18n-page>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'">
<meta name="description" content="Live race results display for Crono — a big, auto-updating leaderboard for a second screen or projector. Reads results live from the timer on the same device; works offline.">
<title data-i18n="title.display">Live results — Crono</title>
<link rel="canonical" href="https://crono.run/display.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Crono">
<meta property="og:locale" content="en">
<meta property="og:title" content="Live results — Crono">
<meta property="og:description" content="A big, auto-updating race results leaderboard for a second screen or projector. Works offline.">
<meta property="og:url" content="https://crono.run/display.html">
<meta property="og:image" content="https://crono.run/assets/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Live results — Crono">
<meta name="twitter:image" content="https://crono.run/assets/og-image.png">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<meta name="theme-color" content="#0b0f14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/display.css">
<link rel="stylesheet" href="assets/toolbar.css">
<script src="assets/head.js"></script>
</head>
<body>

<div class="disp">
  <header class="disp-head">
    <a class="brand" href="app.html" title="Back to the timer" aria-label="Crono — back to the timer">
      <svg class="logo" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" opacity=".25"/>
        <path d="M12 3a9 9 0 0 1 8.5 6.1" stroke="var(--primary)" stroke-width="2.4" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2.3" fill="var(--primary)"/>
      </svg>
      Crono
    </a>
    <div class="disp-clock">
      <span class="disp-clock-k" data-i18n="start.timeSince">Time since start</span>
      <span class="disp-clock-v" id="dispClock">--:--:--</span>
    </div>
    <div class="header-actions">
      <span class="lang-wrap"><select class="hbtn-lang" data-lang-select aria-label="Language" data-i18n-attr="aria-label:lang.label,title:lang.label"></select></span>
      <button type="button" class="hbtn hbtn-theme" data-theme-toggle aria-label="Switch theme" title="Switch theme">
        <svg class="icon theme-to-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon theme-to-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      </button>
      <button type="button" class="hbtn hbtn-fs" id="dispFs" aria-label="Fullscreen" title="Fullscreen">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span class="hbtn-label" data-i18n="display.fullscreen">Fullscreen</span>
      </button>
    </div>
  </header>

  <div class="tabs disp-tabs" id="rankingTabs" role="tablist" aria-label="Ranking"></div>

  <table class="disp-table" id="dispTable">
    <thead>
      <tr>
        <th class="dt-place" data-i18n="th.place">Place</th>
        <th class="dt-num" data-i18n="th.number">Number</th>
        <th class="dt-name" data-i18n="th.name">Name</th>
        <th class="dt-time" data-i18n="th.time">Time</th>
        <th class="dt-pace" data-i18n="flow.thPace">Pace</th>
      </tr>
    </thead>
    <tbody id="dispBody"></tbody>
  </table>
  <p class="disp-empty" id="dispEmpty" data-i18n="display.empty">No finishers yet — results appear here live as they are recorded on the timer.</p>
</div>

<script src="assets/helpers.js"></script>
<script src="assets/i18n.js"></script>
<script src="assets/display.js"></script>
</body>
</html>
